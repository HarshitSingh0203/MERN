<html>
<head>
<title>CSS Selectors</title>

<style>
div{
    border:2px solid black;
    padding:10px;
    margin:10px;
}


.d1, .d2{
    background-color: lightblue;
}


.d1 .d2{
    background-color: yellow;
    color: red;
}


.d1 > .d2{
    border: 4px solid green;
}
</style>

</head>
<body>

<div class="d1">
    Division 1

    <div class="d2">
        Direct Child of d1
    </div>

    <div>
        Another Div

        <div class="d2">
            Descendant of d1 (not direct child)
        </div>

    </div>

</div>

<div class="d2">
    Separate Division 2
</div>

</body>
</html>
