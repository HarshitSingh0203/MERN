<html>
<head>
<title>Display Inline-Block Example</title>

<style>
.d1{
    border:2px solid red;
    width:300px;
    height:100px;
    padding:20px;
    margin:20px;
    font-size:24px;
}

.d2{
    border:2px solid green;
    width:250px;
    height:80px;
    padding:15px;
    margin:15px;
    font-size:20px;
}

#d3{
    display:inline-block;
    border:2px solid yellow;
   
    padding:10px;
    margin:10px;
    font-size:18px;
}

#d4{
    display:inline-block;
    border:2px solid blue;
    
    padding:10px;
    margin:10px;
    font-size:18px;
}
</style>

</head>
<body>

<div class="d1">This is Div 1</div>

<div class="d2">This is Div 2</div>

<span id="d3">This is Span 1</span>

<span id="d4">This is Span 2</span>

</body>
</html>
